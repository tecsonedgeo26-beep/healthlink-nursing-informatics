<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        .clock-container {\n            text-align: center;\n        }\n        .clock {\n            font-size: 3em;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock-container">\n        <h1>Digital Clock</h1>\n        <div class="clock" id="clock">Loading...</div>\n        <h2>Timezones:</h2>\n        <div id="timezones"></div>\n    </div>\n    <script>\n        function updateTime() {\n            const date = new Date();\n            const utc = date.toUTCString();\n            const timezones = {\n                'UTC': date.toUTCString(),\n                'GMT': date.toLocaleString('en-US', { timeZone: 'GMT' }),\n                'EST': date.toLocaleString('en-US', { timeZone: 'America/New_York' }),\n                'CST': date.toLocaleString('en-US', { timeZone: 'America/Chicago' }),\n                'PST': date.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }),\n                'IST': date.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }),\n                'JST': date.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' })\n            };\n            document.getElementById('clock').textContent = utc;\n            const timezoneDiv = document.getElementById('timezones');\n            timezoneDiv.innerHTML = '';\n            for (const [key, value] of Object.entries(timezones)) {\n                timezoneDiv.innerHTML += `<p>${key}: ${value}</p>`;\n            }\n        }\n        setInterval(updateTime, 1000);\n        updateTime();\n    </script>\n</body>\n</html>
